<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Lattice grid nodes -->
  <g fill="#22c55e" opacity="0.5">
    <circle cx="300" cy="180" r="5"/><circle cx="400" cy="150" r="5"/><circle cx="500" cy="180" r="5"/>
    <circle cx="250" cy="260" r="5"/><circle cx="350" cy="240" r="5"/><circle cx="450" cy="240" r="5"/><circle cx="550" cy="260" r="5"/>
    <circle cx="300" cy="330" r="5"/><circle cx="400" cy="310" r="5"/><circle cx="500" cy="330" r="5"/>
    <circle cx="350" cy="400" r="5"/><circle cx="450" cy="400" r="5"/>
  </g>
  <!-- Lattice connections -->
  <g stroke="#22c55e" stroke-width="1" opacity="0.2">
    <line x1="300" y1="180" x2="400" y2="150"/><line x1="400" y1="150" x2="500" y2="180"/>
    <line x1="300" y1="180" x2="250" y2="260"/><line x1="300" y1="180" x2="350" y2="240"/>
    <line x1="400" y1="150" x2="350" y2="240"/><line x1="400" y1="150" x2="450" y2="240"/>
    <line x1="500" y1="180" x2="450" y2="240"/><line x1="500" y1="180" x2="550" y2="260"/>
    <line x1="250" y1="260" x2="350" y2="240"/><line x1="350" y1="240" x2="450" y2="240"/><line x1="450" y1="240" x2="550" y2="260"/>
    <line x1="250" y1="260" x2="300" y2="330"/><line x1="350" y1="240" x2="300" y2="330"/><line x1="350" y1="240" x2="400" y2="310"/>
    <line x1="450" y1="240" x2="400" y2="310"/><line x1="450" y1="240" x2="500" y2="330"/><line x1="550" y1="260" x2="500" y2="330"/>
    <line x1="300" y1="330" x2="400" y2="310"/><line x1="400" y1="310" x2="500" y2="330"/>
    <line x1="300" y1="330" x2="350" y2="400"/><line x1="400" y1="310" x2="350" y2="400"/>
    <line x1="400" y1="310" x2="450" y2="400"/><line x1="500" y1="330" x2="450" y2="400"/>
  </g>
  <!-- Key icon -->
  <g transform="translate(380, 260)" opacity="0.15">
    <circle cx="20" cy="20" r="16" fill="none" stroke="#22c55e" stroke-width="2"/>
    <line x1="36" y1="20" x2="70" y2="20" stroke="#22c55e" stroke-width="2"/>
    <line x1="60" y1="20" x2="60" y2="30" stroke="#22c55e" stroke-width="2"/>
    <line x1="70" y1="20" x2="70" y2="30" stroke="#22c55e" stroke-width="2"/>
  </g>
  <!-- Title -->
  <text x="400" y="490" text-anchor="middle" fill="#e5e5e5" font-family="monospace" font-size="28" font-weight="bold" letter-spacing="4">Lattice Protocol</text>
  <text x="400" y="520" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="14" opacity="0.6" letter-spacing="2">POST-QUANTUM SIGNAL</text>
</svg>
