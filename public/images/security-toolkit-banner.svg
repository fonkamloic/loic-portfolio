<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Shield -->
  <path d="M400 120 L480 160 L480 280 Q480 360 400 400 Q320 360 320 280 L320 160 Z" fill="none" stroke="#22c55e" stroke-width="3" opacity="0.8"/>
  <path d="M400 150 L460 180 L460 270 Q460 340 400 370 Q340 340 340 270 L340 180 Z" fill="#22c55e" opacity="0.08"/>
  <!-- Lock icon inside shield -->
  <rect x="380" y="240" width="40" height="30" rx="4" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.7"/>
  <path d="M388 240 L388 225 Q388 210 400 210 Q412 210 412 225 L412 240" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.7"/>
  <circle cx="400" cy="255" r="4" fill="#22c55e" opacity="0.7"/>
  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#22c55e" stroke-width="1">
    <line x1="0" y1="100" x2="800" y2="100"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="300" x2="800" y2="300"/><line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="0" y1="500" x2="800" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="600"/><line x1="200" y1="0" x2="200" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="500" y1="0" x2="500" y2="600"/><line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="700" y1="0" x2="700" y2="600"/>
  </g>
  <!-- Floating dots -->
  <circle cx="150" cy="150" r="3" fill="#22c55e" opacity="0.3"/>
  <circle cx="650" cy="200" r="2" fill="#22c55e" opacity="0.4"/>
  <circle cx="200" cy="450" r="2.5" fill="#22c55e" opacity="0.25"/>
  <circle cx="600" cy="480" r="3" fill="#22c55e" opacity="0.35"/>
  <!-- Title -->
  <text x="400" y="480" text-anchor="middle" fill="#e5e5e5" font-family="monospace" font-size="28" font-weight="bold" letter-spacing="4">Security Toolkit</text>
  <text x="400" y="510" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="14" opacity="0.6" letter-spacing="2">6 FLUTTER PACKAGES</text>
