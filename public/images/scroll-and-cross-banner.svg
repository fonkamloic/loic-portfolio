<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="#fff">
    <circle cx="80" cy="80" r="2"/><circle cx="120" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="200" cy="80" r="2"/><circle cx="240" cy="80" r="2"/><circle cx="280" cy="80" r="2"/>
    <circle cx="80" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="160" cy="120" r="2"/><circle cx="200" cy="120" r="2"/><circle cx="240" cy="120" r="2"/><circle cx="280" cy="120" r="2"/>
    <circle cx="80" cy="160" r="2"/><circle cx="120" cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="200" cy="160" r="2"/><circle cx="240" cy="160" r="2"/><circle cx="280" cy="160" r="2"/>
    <circle cx="520" cy="440" r="2"/><circle cx="560" cy="440" r="2"/><circle cx="600" cy="440" r="2"/><circle cx="640" cy="440" r="2"/><circle cx="680" cy="440" r="2"/><circle cx="720" cy="440" r="2"/>
    <circle cx="520" cy="480" r="2"/><circle cx="560" cy="480" r="2"/><circle cx="600" cy="480" r="2"/><circle cx="640" cy="480" r="2"/><circle cx="680" cy="480" r="2"/><circle cx="720" cy="480" r="2"/>
    <circle cx="520" cy="520" r="2"/><circle cx="560" cy="520" r="2"/><circle cx="600" cy="520" r="2"/><circle cx="640" cy="520" r="2"/><circle cx="680" cy="520" r="2"/><circle cx="720" cy="520" r="2"/>
  </g>

  <!-- Cross motif (large, centered-left) -->
  <g transform="translate(280, 300)" opacity="0.15">
    <rect x="-60" y="-8" width="120" height="16" rx="4" fill="url(#accent)"/>
    <rect x="-8" y="-60" width="16" height="120" rx="4" fill="url(#accent)"/>
  </g>

  <!-- Smaller cross motifs -->
  <g transform="translate(580, 180)" opacity="0.1">
    <rect x="-30" y="-4" width="60" height="8" rx="3" fill="url(#accent)"/>
    <rect x="-4" y="-30" width="8" height="60" rx="3" fill="url(#accent)"/>
  </g>
  <g transform="translate(160, 440)" opacity="0.1">
    <rect x="-20" y="-3" width="40" height="6" rx="2" fill="url(#accent)"/>
    <rect x="-3" y="-20" width="6" height="40" rx="2" fill="url(#accent)"/>
  </g>

  <!-- Scroll motif (decorative curved lines) -->
  <g opacity="0.12" stroke="url(#accent)" stroke-width="2.5" fill="none">
    <path d="M620 340 C620 310, 650 290, 680 290 C710 290, 710 320, 690 330 C670 340, 650 330, 650 310"/>
    <path d="M130 200 C130 230, 160 250, 190 250 C220 250, 220 220, 200 210 C180 200, 160 210, 160 230"/>
  </g>

  <!-- Title text -->
  <text x="400" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#fff" letter-spacing="2">
    Scroll &amp; Cross
  </text>

  <!-- Subtitle -->
  <text x="400" y="320" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94a3b8" letter-spacing="4" font-weight="300">
    WORD PUZZLE GAME
  </text>

  <!-- Decorative line under subtitle -->
  <rect x="340" y="340" width="120" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- Small cross icon next to title -->
  <g transform="translate(400, 390)" opacity="0.3">
    <rect x="-16" y="-2.5" width="32" height="5" rx="2" fill="url(#accent)"/>
    <rect x="-2.5" y="-16" width="5" height="32" rx="2" fill="url(#accent)"/>
  </g>
</svg>
